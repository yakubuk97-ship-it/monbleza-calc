<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор цены</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--bg:#0c0c0c;--surface:#141414;--s2:#1e1e1e;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--gold:#c9a84c;--text:#f0ede8;--muted:rgba(240,237,232,0.45);--dim:rgba(240,237,232,0.18);}
  html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:40px 20px;background-image:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(201,168,76,0.05) 0%,transparent 70%);}
  .wrap{width:100%;max-width:400px;}
  .title{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;text-align:center;line-height:1.2;margin-bottom:8px;}
  .title em{font-style:italic;color:var(--gold);}
  .subtitle{font-size:11px;color:var(--muted);text-align:center;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:32px;}
  .card{background:var(--surface);border:0.5px solid var(--border);border-radius:2px;padding:28px 24px;position:relative;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.5;}
  .sec-label{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .store-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .store-btn{background:var(--s2);border:0.5px solid var(--border2);border-radius:2px;padding:16px 14px;color:var(--text);font-size:13px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:4px;transition:border-color 0.2s,background 0.2s;}
  .store-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.06);}
  .store-btn .ssub{font-size:10px;color:var(--dim);letter-spacing:0.03em;text-transform:none;font-weight:300;}
  .store-btn.multi{border-color:rgba(201,168,76,0.25);}
  .country-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .country-btn{background:var(--s2);border:0.5px solid var(--border2);border-radius:2px;padding:13px 14px;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:3px;transition:border-color 0.2s,background 0.2s;}
  .country-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.06);}
  .country-btn .csub{font-size:10px;color:var(--dim);font-weight:300;}
  .back-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;margin-bottom:18px;background:none;border:none;padding:0;transition:color 0.2s;}
  .back-btn:hover{color:var(--text);}
  .store-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .store-name{font-size:14px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;}
  .store-link{font-size:11px;color:var(--muted);text-decoration:none;border:0.5px solid var(--border2);padding:4px 9px;border-radius:2px;transition:color 0.2s,border-color 0.2s;}
  .store-link:hover{color:var(--gold);border-color:var(--gold);}
  .field-label{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .input-wrap{position:relative;}
  .input-wrap input{width:100%;background:rgba(255,255,255,0.03);border:0.5px solid var(--border);border-radius:2px;color:var(--text);font-family:'Jost',sans-serif;font-size:30px;font-weight:300;padding:12px 56px 12px 16px;outline:none;transition:border-color 0.2s;-moz-appearance:textfield;}
  .input-wrap input::-webkit-outer-spin-button,.input-wrap input::-webkit-inner-spin-button{-webkit-appearance:none;}
  .input-wrap input:focus{border-color:rgba(201,168,76,0.5);}
  .input-wrap input::placeholder{color:var(--dim);}
  .input-wrap .cur{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);pointer-events:none;}
  .row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:0.5px solid var(--border);}
  .rl{font-size:13px;color:var(--muted);}
  .rv{font-size:13px;color:var(--text);}
  .rv.lg{font-size:15px;}
  .final{padding-top:16px;}
  .fl{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
  .fv{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;color:var(--text);display:flex;align-items:baseline;gap:5px;min-height:56px;}
  .fv .r{font-size:26px;color:var(--muted);}
  .fs{font-size:11px;color:var(--dim);margin-top:4px;}
  .icon-row{display:flex;gap:10px;margin-top:20px;}
  .icon-btn{flex:1;display:flex;align-items:center;justify-content:center;padding:13px;background:transparent;border:0.5px solid var(--border2);border-radius:2px;color:var(--muted);text-decoration:none;transition:border-color 0.2s,color 0.2s;}
  .icon-btn:hover{border-color:var(--gold);color:var(--gold);}
  .icon-btn.primary{border-color:var(--gold);color:var(--gold);}
  .icon-btn.primary:hover{background:var(--gold);color:#0c0c0c;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">Узнать цену<br>с <em>доставкой</em></h1>
  <p class="subtitle">Выбери магазин для расчёта</p>
  <div class="card">
    <div id="s-stores">
      <div class="sec-label">Магазин</div>
      <div class="store-grid">
        <button class="store-btn" onclick="goCalc('end')">END<span class="ssub">endclothing.com · EU</span></button>
        <button class="store-btn multi" onclick="show('s-nb')">New Balance<span class="ssub">4 страны →</span></button>
        <button class="store-btn multi" onclick="show('s-nike')">Nike<span class="ssub">3 страны →</span></button>
        <button class="store-btn" onclick="goCalc('flannels')">Flannels<span class="ssub">flannels.com · UK</span></button>
        <button class="store-btn" onclick="goCalc('bstn')">BSTN<span class="ssub">bstn.com · EU</span></button>
      </div>
    </div>
    <div id="s-nb" class="hidden">
      <button class="back-btn" onclick="show('s-stores')">← назад</button>
      <div class="sec-label">New Balance — выбери сайт</div>
      <div class="country-grid">
        <button class="country-btn" onclick="goCalc('nb-pl')">🇵🇱 Poland<span class="csub">newbalance.pl · EUR</span></button>
        <button class="country-btn" onclick="goCalc('nb-uk')">🇬🇧 UK<span class="csub">newbalance.co.uk · GBP</span></button>
        <button class="country-btn" onclick="goCalc('nb-us')">🇺🇸 USA<span class="csub">newbalance.com · USD</span></button>
        <button class="country-btn" onclick="goCalc('nb-outlet')">🏷 Outlet US<span class="csub">joesnewbalance.com</span></button>
      </div>
    </div>
    <div id="s-nike" class="hidden">
      <button class="back-btn" onclick="show('s-stores')">← назад</button>
      <div class="sec-label">Nike — выбери сайт</div>
      <div class="country-grid">
        <button class="country-btn" onclick="goCalc('nike-us')">🇺🇸 USA<span class="csub">nike.com · USD</span></button>
        <button class="country-btn" onclick="goCalc('nike-de')">🇩🇪 Германия<span class="csub">nike.com/de · EUR</span></button>
        <button class="country-btn" onclick="goCalc('nike-pl')">🇵🇱 Польша<span class="csub">nike.com/pl · EUR</span></button>
      </div>
    </div>
    <div id="s-calc" class="hidden">
      <button class="back-btn" onclick="backFromCalc()">← назад</button>
      <div class="store-header">
        <span class="store-name" id="c-name"></span>
        <a class="store-link" id="c-link" href="#" target="_blank">открыть ↗</a>
      </div>
      <div class="field-label">Цена товара на сайте</div>
      <div class="input-wrap">
        <input type="number" id="price" placeholder="0" min="0" step="1">
        <span class="cur" id="c-cur">EUR</span>
      </div>
      <div class="row">
        <div class="rl">Доставка на склад в Польшу</div>
        <div class="rv" id="c-del">10 EUR</div>
      </div>
      <div class="row hidden" id="sub-row">
        <div class="rl">Промежуточный итог</div>
        <div class="rv lg" id="sub-val">—</div>
      </div>
      <div class="final hidden" id="final-block">
        <div class="fl">Итого к оплате</div>
        <div class="fv"><span id="out-num">—</span><span class="r" id="out-cur"></span></div>
        <div class="fs" id="out-sub"></div>
      </div>
            <div class="icon-row">
        <a class="icon-btn primary" href="https://t.me/euclothing" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        </a>
        <a class="icon-btn primary" href="https://vk.com/euclothing" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7h4.5l2.5 4 2.5-4H16"/><path d="M16 7c0 5-2 9-7 10"/><path d="M2 17h3c1 0 2-.5 3-2"/></svg>
        </a>
        <a class="icon-btn" id="store-icon-link" href="#" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        </a>
        <a class="icon-btn" id="store-icon-link" href="#" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>
  </div>
</div>
<script>
const RATE=95,RATE_GBP=107,RATE_USD=81,MARKUP=0.25;
const stores={
  end:{name:'END',url:'https://www.endclothing.com/eu?storeCode=PL',del:10,log:33,cur:'EUR',rate:RATE,back:'s-stores'},
  flannels:{name:'Flannels',url:'https://www.flannels.com',del:10,log:33,cur:'GBP',rate:RATE_GBP,back:'s-stores'},
  bstn:{name:'BSTN',url:'https://www.bstn.com',del:10,log:33,cur:'EUR',rate:RATE,back:'s-stores'},
  'nb-pl':{name:'NB Poland',url:'https://www.newbalance.pl',del:0,log:23,cur:'EUR',rate:RATE,back:'s-nb'},
  'nb-uk':{name:'NB UK',url:'https://www.newbalance.co.uk',del:10,log:33,cur:'GBP',rate:RATE_GBP,back:'s-nb'},
  'nb-us':{name:'NB USA',url:'https://www.newbalance.com',del:15,log:38,cur:'USD',rate:RATE_USD,back:'s-nb'},
  'nb-outlet':{name:"Joe's Outlet",url:'https://www.joesnewbalanceoutlet.com',del:15,log:38,cur:'USD',rate:RATE_USD,back:'s-nb'},
  'nike-us':{name:'Nike USA',url:'https://www.nike.com',del:15,log:38,cur:'USD',rate:RATE_USD,back:'s-nike'},
  'nike-de':{name:'Nike Germany',url:'https://www.nike.com/de/',del:10,log:33,cur:'EUR',rate:RATE,back:'s-nike'},
  'nike-pl':{name:'Nike Poland',url:'https://www.nike.com/pl/mezczyzni',del:0,log:23,cur:'EUR',rate:RATE,back:'s-nike'},
};
let current=null;
function show(id){['s-stores','s-nb','s-nike','s-calc'].forEach(s=>document.getElementById(s).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function goCalc(key){current=stores[key];document.getElementById('c-name').textContent=current.name;document.getElementById('c-link').href=current.url;document.getElementById('store-icon-link').href=current.url;document.getElementById('c-del').textContent=current.del>0?current.del+' '+current.cur:'Бесплатно';document.getElementById('c-cur').textContent=current.cur;document.getElementById('price').value='';document.getElementById('sub-row').classList.add('hidden');document.getElementById('final-block').classList.add('hidden');document.getElementById('out-num').textContent='—';document.getElementById('out-cur').textContent='';document.getElementById('out-sub').textContent='';show('s-calc');setTimeout(()=>document.getElementById('price').focus(),100);}
function backFromCalc(){show(current?current.back:'s-stores');}
function fmt(n){return Math.round(n).toLocaleString('ru-RU')+' ₽';}
document.getElementById('price').addEventListener('input',function(){if(!current)return;const p=parseFloat(this.value);if(!p||p<=0){document.getElementById('sub-row').classList.add('hidden');document.getElementById('final-block').classList.add('hidden');return;}const subRub=(p+current.del)*current.rate;const finalRub=(p+current.log)*(1+MARKUP)*current.rate;const finalF=(p+current.log)*(1+MARKUP);document.getElementById('sub-val').textContent=fmt(subRub)+' · '+(p+current.del).toFixed(0)+' '+current.cur;document.getElementById('sub-row').classList.remove('hidden');document.getElementById('out-num').textContent=Math.round(finalRub).toLocaleString('ru-RU');document.getElementById('out-cur').textContent='₽';document.getElementById('out-sub').textContent='≈ '+finalF.toFixed(0)+' '+current.cur;document.getElementById('final-block').classList.remove('hidden');});
</script>
</body>
</html>
