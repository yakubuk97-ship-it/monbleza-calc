<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор цены</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c0c; --surface: #141414;
    --border: rgba(255,255,255,0.08);
    --gold: #c9a84c; --text: #f0ede8;
    --muted: rgba(240,237,232,0.45); --dim: rgba(240,237,232,0.18);
  }
  html, body {
    min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: 'Jost', sans-serif; font-weight: 300;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    background-image: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.05) 0%, transparent 70%);
  }
  .wrap { width: 100%; max-width: 400px; }
  .title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; text-align: center; line-height: 1.2; margin-bottom: 40px; }
  .title em { font-style: italic; color: var(--gold); }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 2px; padding: 32px 28px; position: relative; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.5; }
  .source-badge {
    display: inline-block; font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted);
    border: 0.5px solid var(--border); border-radius: 2px;
    padding: 4px 10px; margin-bottom: 24px;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
  }
  .source-badge:hover { border-color: var(--gold); color: var(--gold); }
  .field-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .input-wrap { position: relative; }
  .input-wrap input { width: 100%; background: rgba(255,255,255,0.03); border: 0.5px solid var(--border); border-radius: 2px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 32px; font-weight: 300; padding: 14px 60px 14px 18px; outline: none; transition: border-color 0.2s; -moz-appearance: textfield; }
  .input-wrap input::-webkit-outer-spin-button, .input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .input-wrap input:focus { border-color: rgba(201,168,76,0.5); }
  .input-wrap input::placeholder { color: var(--dim); }
  .input-wrap .cur { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--muted); pointer-events: none; }
  .delivery-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 0.5px solid var(--border); }
  .del-label { font-size: 13px; color: var(--muted); }
  .del-val { font-size: 13px; color: var(--text); font-weight: 400; }
  .sub-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 0.5px solid var(--border); }
  .sub-label { font-size: 13px; color: var(--muted); }
  .sub-val { font-size: 16px; color: var(--text); font-weight: 400; }
  .final-block { padding-top: 20px; }
  .final-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
  .final-val { font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 300; color: var(--text); display: flex; align-items: baseline; gap: 6px; min-height: 62px; }
  .final-val .rub { font-size: 28px; color: var(--muted); }
  .final-sub { font-size: 12px; color: var(--dim); margin-top: 6px; }
  .cta { display: flex; align-items: center; justify-content: center; gap: 9px; width: 100%; margin-top: 28px; padding: 14px 24px; background: transparent; border: 0.5px solid var(--gold); border-radius: 2px; color: var(--gold); font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; text-decoration: none; transition: background 0.2s, color 0.2s; }
  .cta:hover { background: var(--gold); color: #0c0c0c; }
  .hidden { opacity: 0; pointer-events: none; }
  .visible { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">Узнать цену<br>с <em>доставкой</em></h1>
  <div class="card">
    <a class="source-badge" href="https://www.endclothing.com/eu?storeCode=PL" target="_blank">END ↗</a>
    <div class="field-label">Цена товара на сайте</div>
    <div class="input-wrap">
      <input type="number" id="price" placeholder="0" min="0" step="1" autofocus>
      <span class="cur">EUR</span>
    </div>
    <div class="delivery-row">
      <div class="del-label">Платная доставка на склад в Польшу</div>
      <div class="del-val">10 EUR</div>
    </div>
    <div class="sub-row hidden" id="sub-row">
      <div class="sub-label">Промежуточный итог</div>
      <div class="sub-val" id="sub-val">—</div>
    </div>
    <div class="final-block hidden" id="final-block">
      <div class="final-label">Итого к оплате</div>
      <div class="final-val">
        <span id="out-num">—</span>
        <span class="rub" id="out-cur"></span>
      </div>
      <div class="final-sub" id="out-eur"></div>
    </div>
    <a class="cta" href="https://t.me/euclothing" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z"/>
      </svg>
      Написать для заказа
    </a>
  </div>
</div>
<script>
  const RATE = 95, DELIVERY_TO_PL = 10, LOGISTICS_FULL = 33, MARKUP = 0.25;
  const inp = document.getElementById('price');
  function fmt(n) { return Math.round(n).toLocaleString('ru-RU') + ' ₽'; }
  function calc() {
    const p = parseFloat(inp.value);
    const subRow = document.getElementById('sub-row');
    const finalBlock = document.getElementById('final-block');
    if (!p || p <= 0) {
      subRow.className = 'sub-row hidden';
      finalBlock.className = 'final-block hidden';
      return;
    }
    const subtotalEur = p + DELIVERY_TO_PL;
    const subtotalRub = subtotalEur * RATE;
    const finalEur = (p + LOGISTICS_FULL) * (1 + MARKUP);
    const finalRub = finalEur * RATE;
    document.getElementById('sub-val').textContent = fmt(subtotalRub) + '  ·  ' + subtotalEur.toFixed(0) + ' EUR';
    subRow.className = 'sub-row visible';
    document.getElementById('out-num').textContent = Math.round(finalRub).toLocaleString('ru-RU');
    document.getElementById('out-cur').textContent = '₽';
    document.getElementById('out-eur').textContent = '≈ ' + finalEur.toFixed(0) + ' EUR';
    finalBlock.className = 'final-block visible';
  }
  inp.addEventListener('input', calc);
</script>
</body>
</html>
