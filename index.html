<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор цены</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c0c; --surface: #141414;
    --border: rgba(255,255,255,0.08); --gold: #c9a84c;
    --text: #f0ede8; --muted: rgba(240,237,232,0.45); --dim: rgba(240,237,232,0.18);
  }
  html, body {
    min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: 'Jost', sans-serif; font-weight: 300;
    -webkit-font-smoothing: antialiased; display: flex;
    align-items: center; justify-content: center; padding: 40px 20px;
    background-image: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.05) 0%, transparent 70%);
  }
  .wrap { width: 100%; max-width: 400px; }
  .title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; text-align: center; line-height: 1.2; margin-bottom: 40px; }
  .title em { font-style: italic; color: var(--gold); }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 2px; padding: 32px 28px; position: relative; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.5; }
  .source-badge { display: inline-block; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); border: 0.5px solid var(--border); border-radius: 2px; padding: 4px 10px; margin-bottom: 24px; }
  .field-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .input-wrap { position: relative; }
  .input-wrap input { width: 100%; background: rgba(255,255,255,0.03); border: 0.5px solid var(--border); border-radius: 2px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 32px; font-weight: 300; padding: 14px 60px 14px 18px; outline: none; transition: border-color 0.2s; -moz-appearance: textfield; }
  .input-wrap input::-webkit-outer-spin-button, .input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .input-wrap input:focus { border-color: rgba(201,168,76,0.5); }
  .input-wrap input::placeholder { color: var(--dim); }
  .input-wrap .cur { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--muted); pointer-events: none; }
  .divider { height: 0.5px; background: var(--border); margin: 24px 0; }
  .out-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .out-val { font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 300; color: var(--text); min-height: 62px; display: flex; align-items: baseline; gap: 6px; }
  .out-val .rub { font-size: 28px; color: var(--muted); }
  .out-sub { font-size: 12px; color: var(--dim); margin-top: 6px; min-height: 16px; }
  .cta { display: flex; align-items: center; justify-content: center; gap: 9px; width: 100%; margin-top: 28px; padding: 14px 24px; background: transparent; border: 0.5px solid var(--gold); border-radius: 2px; color: var(--gold); font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; text-decoration: none; transition: background 0.2s, color 0.2s; }
  .cta:hover { background: var(--gold); color: #0c0c0c; }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">Узнать цену<br>с <em>доставкой</em></h1>
  <div class="card">
    <div class="source-badge">END</div>
    <div class="field-label">Цена товара на сайте</div>
    <div class="input-wrap">
      <input type="number" id="price" placeholder="0" min="0" step="1" autofocus>
      <span class="cur">EUR</span>
    </div>
    <div class="divider"></div>
    <div class="out-label">Итоговая цена</div>
    <div class="out-val">
      <span id="out-num">—</span>
      <span class="rub" id="out-cur"></span>
    </div>
    <div class="out-sub" id="out-eur"></div>
    <a class="cta" href="https://t.me/euclothing" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z"/>
      </svg>
      Написать для заказа
    </a>
  </div>
</div>
<script>
  const RATE = 95, LOGISTICS = 23, MARKUP = 0.25;
  const inp = document.getElementById('price');
  const outNum = document.getElementById('out-num');
  const outCur = document.getElementById('out-cur');
  const outEur = document.getElementById('out-eur');
  function fmt(n) { return Math.round(n).toLocaleString('ru-RU'); }
  function calc() {
    const p = parseFloat(inp.value);
    if (!p || p <= 0) { outNum.textContent = '—'; outCur.textContent = ''; outEur.textContent = ''; return; }
    const finalEur = (p + LOGISTICS) * (1 + MARKUP);
    const finalRub = finalEur * RATE;
    outNum.textContent = fmt(finalRub);
    outCur.textContent = '₽';
    outEur.textContent = '≈ ' + finalEur.toFixed(0) + ' EUR';
  }
  inp.addEventListener('input', calc);
</script>
</body>
</html>
