name: Update Stock (hourly)

on:
  schedule:
    - cron: '0 * * * *'   # каждый час в 0 минут
  workflow_dispatch:        # можно запустить вручную из GitHub Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Update stock.json
        run: python update_stock.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stock.json img/
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update stock $(date +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
